<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">QuizLoop.ai Architecture</title>
  <desc id="desc">A loop showing source material entering Gemma 4, becoming learning objects in SQLite, powering quizzes, grading, and returning evidence to memory.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .card { fill: #ffffff; stroke: #d9dee8; stroke-width: 2; }
      .primary { fill: #1a73e8; }
      .green { fill: #34a853; }
      .cyan { fill: #13c8d4; }
      .ink { fill: #202124; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .muted { fill: #5f6368; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { font-size: 26px; font-weight: 600; }
      .tiny { font-size: 21px; }
      .title { font-size: 52px; font-weight: 800; }
      .label { font-size: 30px; font-weight: 800; }
      .arrow { stroke: #5f6368; stroke-width: 4; fill: none; marker-end: url(#arrowhead); }
      .loop { stroke: #34a853; stroke-width: 5; fill: none; marker-end: url(#greenArrow); }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#5f6368"/>
    </marker>
    <marker id="greenArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#34a853"/>
    </marker>
  </defs>

  <rect class="bg" width="1400" height="820" rx="36"/>

  <text x="70" y="90" class="ink title">QuizLoop.ai Architecture</text>
  <text x="72" y="135" class="muted tiny">Gemma 4 supplies intelligence. SQLite stores learning memory. The interface keeps the student moving through quizzes.</text>

  <rect x="70" y="200" width="250" height="170" rx="28" class="card"/>
  <circle cx="110" cy="246" r="16" class="primary"/>
  <text x="140" y="257" class="ink label">Input</text>
  <text x="100" y="305" class="muted tiny">Notes</text>
  <text x="100" y="335" class="muted tiny">Wikipedia</text>
  <text x="100" y="365" class="muted tiny">Math and books</text>

  <rect x="410" y="200" width="250" height="170" rx="28" class="card"/>
  <circle cx="450" cy="246" r="16" class="cyan"/>
  <text x="480" y="257" class="ink label">Gemma 4</text>
  <text x="440" y="305" class="muted tiny">Read source</text>
  <text x="440" y="335" class="muted tiny">Extract concepts</text>
  <text x="440" y="365" class="muted tiny">Create checks</text>

  <rect x="750" y="200" width="250" height="170" rx="28" class="card"/>
  <circle cx="790" cy="246" r="16" class="green"/>
  <text x="820" y="257" class="ink label">SQLite</text>
  <text x="780" y="305" class="muted tiny">Notes</text>
  <text x="780" y="335" class="muted tiny">Questions</text>
  <text x="780" y="365" class="muted tiny">Attempts</text>

  <rect x="1080" y="200" width="250" height="170" rx="28" class="card"/>
  <circle cx="1120" cy="246" r="16" class="primary"/>
  <text x="1150" y="257" class="ink label">Planner</text>
  <text x="1110" y="305" class="muted tiny">Weak concepts</text>
  <text x="1110" y="335" class="muted tiny">Fresh topics</text>
  <text x="1110" y="365" class="muted tiny">Harder checks</text>

  <rect x="750" y="500" width="250" height="170" rx="28" class="card"/>
  <circle cx="790" cy="546" r="16" class="cyan"/>
  <text x="820" y="557" class="ink label">Quiz</text>
  <text x="780" y="605" class="muted tiny">Multiple choice</text>
  <text x="780" y="635" class="muted tiny">Short answers</text>
  <text x="780" y="665" class="muted tiny">One journey</text>

  <rect x="410" y="500" width="250" height="170" rx="28" class="card"/>
  <circle cx="450" cy="546" r="16" class="green"/>
  <text x="480" y="557" class="ink label">Grade</text>
  <text x="440" y="605" class="muted tiny">Score answer</text>
  <text x="440" y="635" class="muted tiny">Explain misses</text>
  <text x="440" y="665" class="muted tiny">Save evidence</text>

  <rect x="70" y="500" width="250" height="170" rx="28" class="card"/>
  <circle cx="110" cy="546" r="16" class="primary"/>
  <text x="140" y="557" class="ink label">Progress</text>
  <text x="100" y="605" class="muted tiny">Understanding</text>
  <text x="100" y="635" class="muted tiny">History</text>
  <text x="100" y="665" class="muted tiny">Next quiz</text>

  <path d="M320 285 L405 285" class="arrow"/>
  <path d="M660 285 L745 285" class="arrow"/>
  <path d="M1000 285 L1075 285" class="arrow"/>
  <path d="M1205 370 C1205 455 1045 455 1000 565" class="arrow"/>
  <path d="M750 585 L665 585" class="arrow"/>
  <path d="M410 585 L325 585" class="arrow"/>
  <path d="M535 500 C535 425 705 425 790 370" class="loop"/>

  <rect x="370" y="715" width="660" height="56" rx="28" fill="#e8f0fe"/>
  <text x="405" y="752" class="ink small">Every answer updates memory, so the next quiz is more personal.</text>
</svg>
